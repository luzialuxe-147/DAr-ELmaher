<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - دار الماهر</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* إضافات مخصصة لصفحة تسجيل الدخول */
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 50px;
            background: linear-gradient(135deg, rgba(0, 188, 212, 0.9) 0%, rgba(0, 151, 167, 0.95) 100%);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid var(--gold);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 1rem;
        }

        .auth-header h2 {
            color: var(--primary-dark);
            font-size: 2rem;
        }

        .auth-header p {
            color: var(--dark);
            opacity: 0.7;
        }

        .auth-form .form-group {
            margin-bottom: 1.5rem;
        }

        .auth-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark);
            font-weight: 600;
        }

        .auth-form input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--gray-dark);
            border-radius: 15px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .auth-form input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        .auth-form .btn {
            width: 100%;
            margin-top: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            color: var(--gold);
        }

        .forgot-password {
            display: block;
            text-align: left;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--dark);
            opacity: 0.5;
        }

        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--gray-dark);
        }

        .separator span {
            padding: 0 10px;
        }

        .social-login {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--white);
            border: 2px solid var(--gray-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--dark);
            transition: var(--transition);
            cursor: pointer;
        }

        .social-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-3px);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header (نفس الهيدر مع تعديل الروابط) -->
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="../assets/images/logo.png" alt="دار الماهر" class="logo-img" onerror="this.src='https://via.placeholder.com/50x50/00bcd4/d4af37?text=DM'">
                <span>دار الماهر</span>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html">الرئيسية</a></li>
                <li><a href="../index.html#about">من نحن</a></li>
                <li><a href="programs.html">البرامج</a></li>
                <li><a href="register.html">التسجيل</a></li>
                <li><a href="login.html" class="active">تسجيل الدخول</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <!-- Login Form -->
    <section class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <img src="../assets/images/logo.png" alt="دار الماهر" onerror="this.src='https://via.placeholder.com/80x80/00bcd4/d4af37?text=DM'">
                <h2>تسجيل الدخول</h2>
                <p>أهلاً بك مرة أخرى في دار الماهر</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" placeholder="أدخل بريدك الإلكتروني" required>
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required>
                    <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="btn btn-primary">دخول <i class="fas fa-sign-in-alt"></i></button>
            </form>

            <div class="separator">
                <span>أو</span>
            </div>

            <div class="social-login">
                <button class="social-btn" title="تسجيل الدخول بجوجل"><i class="fab fa-google"></i></button>
                <button class="social-btn" title="تسجيل الدخول بفيسبوك"><i class="fab fa-facebook-f"></i></button>
                <button class="social-btn" title="تسجيل الدخول بتويتر"><i class="fab fa-twitter"></i></button>
            </div>

            <div class="auth-footer">
                <p>ليس لديك حساب؟ <a href="register.html">سجل الآن</a></p>
            </div>
        </div>
    </section>

    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // تهيئة القائمة المتنقلة
            const hamburger = document.querySelector('.hamburger');
            const navMenu = document.querySelector('.nav-menu');
            
            if (hamburger && navMenu) {
                hamburger.addEventListener('click', () => {
                    hamburger.classList.toggle('active');
                    navMenu.classList.toggle('active');
                });
            }

            // معالجة نموذج تسجيل الدخول
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    
                    await api.loginUser(email, password);
                });
            }
        });
    </script>
</body>
</html>
